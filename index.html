<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Path of the Young Monk — Shaolin Temple</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#130a04;
  --bg-panel:#1e1008;
  --bg-card:#2b160a;
  --bg-card-h:#391e0d;
  --text:#fdf5e8;
  --text-muted:#d4a87a;
  --text-dim:#8a6040;
  --red:#ff4422;
  --red-glow:rgba(255,68,34,0.35);
  --gold:#ffcc00;
  --gold-l:#ffe566;
  --gold-glow:rgba(255,204,0,0.35);
  --jade:#3dd68c;
  --jade-glow:rgba(61,214,140,0.25);
  --wood:#3d2210;
  --wood-l:#5c3418;
  --r:12px;--rl:22px;--tr:0.3s ease;
  --white-s:#e8e8e8;--yellow-s:#ffcc00;--orange-s:#ff7700;
}
html,body{min-height:100vh;margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Fredoka',sans-serif;font-size:17px;line-height:1.6;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 80%,rgba(255,100,0,0.07) 0%,transparent 50%),radial-gradient(ellipse at 85% 15%,rgba(255,204,0,0.07) 0%,transparent 45%),radial-gradient(ellipse at 50% 95%,rgba(255,68,34,0.05) 0%,transparent 50%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--wood);border-radius:3px}
.hidden{display:none!important}
h1,h2,h3{font-family:'Bangers',cursive;letter-spacing:.04em}

/* === TRANSITIONS === */
.view{position:relative;z-index:1;opacity:0;transform:translateY(10px);transition:opacity .35s ease,transform .35s ease;pointer-events:none}
.view.visible{opacity:1;transform:translateY(0);pointer-events:all}

/* === WELCOME === */
#view-welcome{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;min-height:100vh;min-height:100dvh;padding:0;position:relative;overflow:hidden}
.welcome-bg{position:absolute;inset:0;background:url('assets/images/Gemini_Generated_Image_wd4nxtwd4nxtwd4n.png') center 8%/cover no-repeat;z-index:0}
.welcome-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0) 0%,rgba(0,0,0,.08) 55%,rgba(10,20,10,.82) 80%,rgba(10,20,10,.95) 100%)}
.welcome-gate{position:relative;z-index:1;max-width:480px;width:100%;text-align:center;padding:0 24px 48px}
.temple-sym{display:none}
.welcome-gate h1{display:none}
.welcome-sub{display:none}
.welcome-gate>p{display:none}
.divider{width:120px;height:2px;background:linear-gradient(90deg,transparent,var(--jade),transparent);margin:16px auto}
.name-form{display:flex;flex-direction:column;gap:14px;align-items:center}
.name-form label{font-family:'Bangers',cursive;font-size:1.1rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase}
.name-input{width:100%;padding:16px 22px;background:rgba(18,28,18,.75);backdrop-filter:blur(8px);border:2px solid var(--wood-l);border-radius:var(--r);color:var(--text);font-family:'Fredoka',sans-serif;font-size:1.2rem;font-weight:700;text-align:center;outline:none;transition:border-color var(--tr),box-shadow var(--tr)}
.name-input:focus{border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-glow)}
.name-input::placeholder{color:var(--text-dim)}

/* === BUTTONS === */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 26px;border:none;border-radius:var(--r);font-family:'Bangers',cursive;font-size:1rem;letter-spacing:.06em;cursor:pointer;transition:all var(--tr);text-decoration:none;white-space:nowrap;line-height:1}
.btn-primary{background:var(--red);color:#fff;box-shadow:0 4px 20px var(--red-glow)}
.btn-primary:hover{background:#f04030;box-shadow:0 6px 28px rgba(232,57,43,.5);transform:translateY(-2px)}
.btn-gold{background:var(--gold);color:#1a0e00;box-shadow:0 4px 20px var(--gold-glow)}
.btn-gold:hover{background:var(--gold-l);box-shadow:0 6px 28px rgba(255,184,0,.5);transform:translateY(-2px)}
.btn-outline{background:transparent;color:var(--text-muted);border:2px solid var(--wood-l)}
.btn-outline:hover{border-color:var(--jade);color:var(--text)}
.btn-sm{padding:8px 16px;font-size:.88rem}
.btn-lg{padding:17px 34px;font-size:1.15rem}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none!important}

/* === TOP NAV === */
.top-nav{position:sticky;top:0;z-index:100;background:rgba(14,28,10,.97);backdrop-filter:blur(12px);border-bottom:2px solid var(--wood);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.nav-brand{display:flex;align-items:center;gap:8px;cursor:pointer;text-decoration:none}
.nav-brand-icon{font-size:1.4rem}
.nav-brand-text{font-family:'Bangers',cursive;font-size:1.1rem;color:var(--gold);letter-spacing:.08em}
.nav-right{display:flex;align-items:center;gap:10px}
.sash-badge{display:flex;align-items:center;gap:6px;padding:5px 13px;border-radius:20px;font-size:.9rem;font-family:'Bangers',cursive;letter-spacing:.05em;transition:all var(--tr)}
.sash-badge.white{background:rgba(220,220,220,.1);color:var(--white-s);border:1px solid rgba(220,220,220,.22)}
.sash-badge.yellow{background:rgba(255,184,0,.15);color:var(--yellow-s);border:1px solid rgba(255,184,0,.35)}
.sash-badge.orange{background:rgba(255,109,0,.15);color:var(--orange-s);border:1px solid rgba(255,109,0,.35)}
.sash-badge.green{background:rgba(68,204,68,.15);color:#44cc44;border:1px solid rgba(68,204,68,.35)}
.sash-badge.blue{background:rgba(34,136,255,.15);color:#2288ff;border:1px solid rgba(34,136,255,.35)}
.sash-badge.brown{background:rgba(192,112,48,.15);color:#c07030;border:1px solid rgba(192,112,48,.35)}
.sash-badge.black{background:rgba(110,110,110,.15);color:#aaaaaa;border:1px solid rgba(110,110,110,.35)}
.sash-dot{width:8px;height:8px;border-radius:50%}
.white .sash-dot{background:var(--white-s)}.yellow .sash-dot{background:var(--yellow-s)}.orange .sash-dot{background:var(--orange-s)}
.green .sash-dot{background:#44cc44}.blue .sash-dot{background:#2288ff}.brown .sash-dot{background:#c07030}.black .sash-dot{background:#aaaaaa}
.nav-path-btn{background:none;border:none;font-size:1rem;cursor:pointer;padding:4px 8px;border-radius:8px;color:var(--text-muted);font-family:'Bangers',cursive;letter-spacing:.05em;transition:color var(--tr)}
.nav-path-btn:hover{color:var(--text)}
.nav-sound-btn{background:none;border:none;font-size:1.1rem;cursor:pointer;padding:4px 6px;border-radius:8px;transition:opacity var(--tr);opacity:.75}
.nav-sound-btn:hover{opacity:1}
/* === PATH VIEW === */
.path-inner{max-width:680px;margin:0 auto;padding:24px 20px 120px}
.path-title{font-family:'Bangers',cursive;font-size:1.5rem;color:var(--jade);letter-spacing:.1em;text-align:center;margin-bottom:28px}
.path-zone{margin-bottom:8px}
.path-zone-banner{display:flex;align-items:center;gap:10px;padding:8px 16px;border-radius:var(--r);font-family:'Bangers',cursive;font-size:1rem;letter-spacing:.07em;margin-bottom:12px}
.path-zone-banner.white{background:rgba(224,224,224,.08);border:1px solid rgba(255,255,255,.12);color:var(--text-muted)}
.path-zone-banner.yellow{background:rgba(255,184,0,.1);border:1px solid rgba(255,184,0,.3);color:var(--gold)}
.path-zone-banner.orange{background:rgba(255,109,0,.1);border:1px solid rgba(255,109,0,.3);color:#ff8c40}
.path-zone-banner.green{background:rgba(68,204,68,.08);border:1px solid rgba(68,204,68,.3);color:#44cc44}
.path-zone-banner.blue{background:rgba(34,136,255,.08);border:1px solid rgba(34,136,255,.3);color:#2288ff}
.path-connector{width:2px;height:28px;background:linear-gradient(to bottom,var(--jade),transparent);margin:0 auto 0 36px;opacity:.4}
.path-node{display:flex;align-items:flex-start;gap:14px;padding:12px 14px;border-radius:var(--r);cursor:pointer;transition:background var(--tr);border:1.5px solid transparent;margin-bottom:4px}
.path-node:hover{background:rgba(255,255,255,.04);border-color:var(--wood-l)}
.path-node-icon{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;position:relative;border:2px solid var(--wood-l)}
.path-node-icon.reached{border-color:var(--jade);background:rgba(82,192,80,.1);box-shadow:0 0 12px rgba(82,192,80,.2)}
.path-node-icon.current{border-color:var(--gold);background:rgba(255,184,0,.1);box-shadow:0 0 14px rgba(255,184,0,.3);animation:pulse-node 2s ease-in-out infinite}
.path-node-icon.ahead{opacity:.4}
@keyframes pulse-node{0%,100%{box-shadow:0 0 10px rgba(255,184,0,.3)}50%{box-shadow:0 0 20px rgba(255,184,0,.55)}}
.path-node-icon.current::after{content:'🧘';font-size:.75rem;position:absolute;top:-8px;right:-8px;background:var(--bg-card);border-radius:50%;padding:1px 2px}
.path-node-info{flex:1;min-width:0;padding-top:4px}
.path-node-name{font-family:'Bangers',cursive;font-size:1.1rem;color:var(--text);letter-spacing:.04em;margin-bottom:2px}
.path-node-skill{font-size:.82rem;color:var(--text-muted)}
.path-node-belts{display:flex;gap:4px;margin-top:6px}
.path-node-belt{font-size:.7rem;padding:2px 6px;border-radius:8px;font-family:'Bangers',cursive}
.path-summit{text-align:center;padding:28px 16px;border:2px solid rgba(255,109,0,.35);border-radius:var(--rl);background:rgba(255,109,0,.06);margin-top:12px}
.path-summit-emoji{font-size:3rem;display:block;margin-bottom:8px}
.path-summit-title{font-family:'Bangers',cursive;font-size:1.4rem;color:#ff8c40;letter-spacing:.06em}
.path-summit-desc{font-size:.88rem;color:var(--text-muted);margin-top:6px}
.path-prize{margin-top:10px;padding:12px 14px;border-radius:var(--r);border:1.5px dashed rgba(255,184,0,.35);background:rgba(255,184,0,.05)}
.path-prize-header{font-family:'Bangers',cursive;font-size:.85rem;color:var(--gold);letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.path-prize-row{display:flex;align-items:center;gap:10px;font-size:.85rem;color:var(--text-muted);padding:4px 0}
.path-prize-row+.path-prize-row{border-top:1px solid rgba(255,255,255,.05)}
.path-prize-icon{font-size:1.1rem;flex-shrink:0}
.cer-prize{margin:14px 0 4px;padding:14px 16px;border-radius:var(--r);background:rgba(255,184,0,.08);border:1.5px solid rgba(255,184,0,.4);text-align:left}
.cer-prize-header{font-family:'Bangers',cursive;font-size:.9rem;color:var(--gold);letter-spacing:.08em;margin-bottom:8px}
.cer-prize-row{display:flex;align-items:center;gap:10px;font-size:.9rem;color:var(--text);padding:5px 0}
.cer-prize-row+.cer-prize-row{border-top:1px solid rgba(255,255,255,.07)}
.nav-journal-btn{background:none;border:2px solid var(--wood-l);border-radius:var(--r);color:var(--text-muted);padding:6px 13px;font-size:.9rem;cursor:pointer;transition:all var(--tr);font-family:'Fredoka',sans-serif;font-weight:700}
.nav-journal-btn:hover{border-color:var(--jade);color:var(--text)}

/* === DASHBOARD === */
#view-dashboard{min-height:100vh}
.dash-inner{max-width:900px;margin:0 auto;padding:32px 20px 80px}
.rank-banner{background:var(--bg-card);border:2px solid var(--wood-l);border-radius:var(--rl);padding:28px 32px;margin-bottom:32px;display:flex;align-items:center;gap:24px;flex-wrap:wrap;box-shadow:0 4px 24px rgba(0,0,0,.3)}
.rank-circle{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.9rem;flex-shrink:0;position:relative}
.rank-circle::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid currentColor;opacity:.4}
.rank-circle.white{background:rgba(224,224,224,.1);color:var(--white-s)}
.rank-circle.yellow{background:rgba(255,184,0,.15);color:var(--yellow-s);box-shadow:0 0 16px rgba(255,184,0,.3)}
.rank-circle.orange{background:rgba(255,109,0,.15);color:var(--orange-s);box-shadow:0 0 16px rgba(255,109,0,.3)}
.rank-circle.green{background:rgba(68,204,68,.15);color:#44cc44;box-shadow:0 0 16px rgba(68,204,68,.3)}
.rank-circle.blue{background:rgba(34,136,255,.15);color:#2288ff;box-shadow:0 0 16px rgba(34,136,255,.3)}
.rank-circle.brown{background:rgba(192,112,48,.15);color:#c07030;box-shadow:0 0 16px rgba(192,112,48,.3)}
.rank-circle.black{background:rgba(110,110,110,.15);color:#aaaaaa;box-shadow:0 0 16px rgba(110,110,110,.25)}
.rank-info{flex:1;min-width:0}
.rank-greeting{font-family:'Bangers',cursive;font-size:.9rem;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.rank-monk-name{font-family:'Bangers',cursive;font-size:clamp(1.6rem,4vw,2.2rem);color:var(--text);margin-bottom:3px;letter-spacing:.05em}
.rank-title-txt{font-size:1rem;color:var(--text-muted);margin-bottom:14px;font-weight:600}
.prog-track{height:10px;background:var(--wood);border-radius:5px;overflow:hidden;max-width:300px}
.prog-fill{height:100%;border-radius:5px;transition:width 1.2s ease}
.prog-fill.white-p{background:linear-gradient(90deg,#aaa,#e8e8e8)}
.prog-fill.yellow-p{background:linear-gradient(90deg,#e8a000,var(--gold-l))}
.prog-fill.orange-p{background:linear-gradient(90deg,var(--gold),var(--orange-s))}
.prog-fill.green-p{background:linear-gradient(90deg,#2a8a2a,#44cc44)}
.prog-fill.blue-p{background:linear-gradient(90deg,#1155cc,#2288ff)}
.prog-fill.brown-p{background:linear-gradient(90deg,#7a4020,#c07030)}
.prog-fill.black-p{background:linear-gradient(90deg,#333,#888)}
.prog-label{font-size:.88rem;color:var(--text-dim);margin-top:6px;font-weight:600}
.rank-quote{font-style:italic;color:var(--text-muted);font-size:.95rem;border-left:3px solid var(--jade);padding-left:14px;max-width:200px;flex-shrink:0;font-weight:600}
.section-hdr{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.section-title{font-family:'Bangers',cursive;font-size:1rem;color:var(--jade);letter-spacing:.12em;text-transform:uppercase;white-space:nowrap}
.section-hdr::after{content:'';flex:1;height:2px;background:var(--wood)}
.scrolls-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.scroll-card{background:var(--bg-card);border:2px solid var(--wood-l);border-radius:var(--rl);padding:24px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.scroll-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--rl) var(--rl) 0 0;background:var(--wood);transition:background var(--tr)}
.scroll-card.active{border-color:rgba(232,57,43,.6);background:linear-gradient(135deg,rgba(232,57,43,.08),var(--bg-card));box-shadow:0 0 28px var(--red-glow),0 6px 20px rgba(0,0,0,.3)}
.scroll-card.active::before{background:var(--red)}
.scroll-card.complete{border-color:rgba(255,184,0,.4)}
.scroll-card.complete::before{background:var(--gold)}
.scroll-card.locked{opacity:.35;cursor:not-allowed}
.scroll-card:not(.locked):hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.3)}
.scroll-card:not(.locked):not(.active):hover{border-color:var(--jade)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.card-emoji{font-size:2.2rem;line-height:1}
.card-status{font-size:.78rem;font-family:'Bangers',cursive;letter-spacing:.06em;padding:3px 9px;border-radius:12px}
.st-active{background:var(--red-glow);color:var(--red);border:1px solid rgba(232,57,43,.3)}
.st-complete{background:var(--gold-glow);color:var(--gold);border:1px solid rgba(255,184,0,.3)}
.st-locked{color:var(--text-dim)}
.st-new{background:rgba(82,192,80,.2);color:var(--jade);border:1.5px solid rgba(82,192,80,.5)}
.inline-progress-row{display:inline-flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:4px}
.card-num{font-family:'Bangers',cursive;font-size:.82rem;color:var(--text-dim);letter-spacing:.08em;margin-bottom:5px}
.card-name{font-family:'Bangers',cursive;font-size:1.15rem;color:var(--text);margin-bottom:6px;line-height:1.25;letter-spacing:.04em}
.scroll-card.locked .card-name{color:var(--text-dim)}
.card-skill{font-size:.93rem;color:var(--text-muted);font-style:italic;line-height:1.45;font-weight:600}
.card-date{font-size:.82rem;color:var(--text-dim);margin-top:10px;font-weight:600}
.card-progress{margin-top:10px;font-size:.88rem;display:flex;align-items:center;gap:6px}
.card-progress span{color:var(--text-dim);font-family:'Bangers',cursive;font-size:.82rem;letter-spacing:.04em}

/* === SESSION MODAL === */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg-panel);border:2px solid var(--wood-l);border-radius:var(--rl);padding:32px;max-width:480px;width:100%;position:relative;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.modal-ttl{font-family:'Bangers',cursive;font-size:1.4rem;color:var(--gold);margin-bottom:4px;letter-spacing:.06em}
.modal-sub{color:var(--text-muted);font-size:1rem;margin-bottom:22px;font-weight:600}
.session-modes{display:flex;flex-direction:column;gap:12px;margin-bottom:18px}
.smode-card{background:var(--bg-card);border:2px solid var(--wood-l);border-radius:var(--r);padding:16px 20px;cursor:pointer;transition:all var(--tr);display:flex;align-items:center;gap:16px;text-align:left}
.smode-card:hover{border-color:var(--jade);background:var(--bg-card-h);transform:translateX(3px)}
.smode-time{font-family:'Bangers',cursive;font-size:1.6rem;color:var(--red);min-width:55px;flex-shrink:0;letter-spacing:.04em}
.smode-name{font-family:'Bangers',cursive;font-size:1.05rem;color:var(--text);margin-bottom:3px;letter-spacing:.04em}
.smode-desc{font-size:.9rem;color:var(--text-muted);font-weight:600}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text-dim);font-size:1.3rem;cursor:pointer;padding:4px 8px;transition:color var(--tr)}
.modal-close:hover{color:var(--text)}

/* === SCROLL DETAIL === */
#view-scroll{min-height:100vh}
.scroll-inner{max-width:700px;margin:0 auto;padding:30px 20px 110px}
.scroll-back{display:inline-flex;align-items:center;gap:6px;color:var(--text-muted);font-size:.95rem;cursor:pointer;margin-bottom:26px;transition:color var(--tr);background:none;border:none;padding:0;font-family:'Fredoka',sans-serif;font-weight:700}
.scroll-back:hover{color:var(--jade)}
.scroll-hero{text-align:center;margin-bottom:36px}
.scroll-hero .sh-emoji{font-size:4.5rem;display:block;margin-bottom:10px;animation:float 4s ease-in-out infinite}
.sh-num{font-family:'Bangers',cursive;font-size:.9rem;color:var(--text-dim);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}
.scroll-hero h2{font-family:'Bangers',cursive;font-size:clamp(1.8rem,5vw,2.6rem);color:var(--gold);margin-bottom:10px;letter-spacing:.05em;text-shadow:0 0 24px rgba(255,184,0,.3)}
.skill-tag{display:inline-block;background:var(--red-glow);border:1px solid rgba(232,57,43,.25);border-radius:20px;padding:4px 16px;font-size:.95rem;color:var(--red);font-style:italic;font-weight:700}
.s-section{margin-bottom:30px}
.s-label{font-family:'Bangers',cursive;font-size:.9rem;color:var(--jade);letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.s-label::after{content:'';flex:1;height:2px;background:var(--wood)}
.story-box{font-style:italic;color:var(--text-muted);line-height:1.9;font-size:1.05rem;padding:20px 22px;background:var(--bg-card);border-radius:var(--r);border-left:4px solid var(--jade);font-weight:600}
.prac-list{list-style:none;display:flex;flex-direction:column;gap:10px}
.prac-list li{padding:13px 17px;background:var(--bg-card);border-radius:var(--r);border:1px solid var(--wood-l);font-size:1rem;color:var(--text);line-height:1.65;display:flex;gap:12px;align-items:flex-start;font-weight:600}
.prac-list li::before{content:'🥋';font-size:.85rem;margin-top:2px;flex-shrink:0}
.real-life-box{background:var(--bg-card);border:2px solid rgba(255,184,0,.35);border-radius:var(--r);padding:20px;position:relative}
.real-life-box::before{content:'⚡ REAL-LIFE POWER';font-family:'Bangers',cursive;font-size:.85rem;color:var(--gold);letter-spacing:.12em;display:block;margin-bottom:10px}
.real-life-box p{color:var(--text-muted);font-style:italic;font-size:1rem;line-height:1.75;font-weight:600}
.roleplay-box{background:linear-gradient(135deg,rgba(82,192,80,.08),transparent);border:2px solid rgba(82,192,80,.25);border-radius:var(--r);padding:20px}
.roleplay-box::before{content:'🎭 ABBOT SAYS';font-family:'Bangers',cursive;font-size:.85rem;color:var(--jade);letter-spacing:.12em;display:block;margin-bottom:10px}
.roleplay-box p{color:var(--text-muted);font-style:italic;font-size:1rem;line-height:1.75;font-weight:600}

/* === BOTTOM COMPLETE BAR === */
.complete-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(14,28,10,.98);backdrop-filter:blur(12px);border-top:2px solid var(--wood-l);padding:15px 24px;display:flex;align-items:center;justify-content:space-between;gap:14px;z-index:150;flex-wrap:wrap}
.cbar-info{font-size:.95rem;color:var(--text-muted);font-weight:600}
.cbar-info strong{color:var(--text);font-family:'Bangers',cursive;font-size:1rem;display:block;margin-bottom:2px;letter-spacing:.04em}
.already-done-badge{display:inline-flex;align-items:center;gap:6px;font-family:'Bangers',cursive;font-size:.95rem;color:var(--gold);padding:7px 16px;border:2px solid rgba(255,184,0,.35);border-radius:20px;background:var(--gold-glow);letter-spacing:.04em}

/* === BREATHING TIMER === */
.breathing-timer{text-align:center;padding:30px 20px;background:var(--bg-card);border:2px solid var(--wood-l);border-radius:var(--rl);margin-bottom:14px}
.breathing-phase-txt{font-family:'Bangers',cursive;font-size:1.3rem;color:var(--text);margin-bottom:2px;min-height:1.6em;transition:color .3s;letter-spacing:.06em}
.breathing-count-txt{font-size:3.5rem;font-family:'Bangers',cursive;color:var(--gold);margin-bottom:2px;min-height:4rem;line-height:1;text-shadow:0 0 20px rgba(255,184,0,.4)}
.breathing-rounds-txt{font-size:.95rem;color:var(--text-muted);margin-bottom:20px;min-height:1.2em;font-weight:700}
.timer-ctrls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.breathing-done-msg{font-family:'Bangers',cursive;color:var(--jade);font-size:1.2rem;margin:10px 0 0;letter-spacing:.04em}

/* === STANCE TIMER === */
.stance-timer{text-align:center;padding:30px 20px;background:var(--bg-card);border:2px solid var(--wood-l);border-radius:var(--rl);margin-bottom:14px}
.stance-ring-wrap{display:inline-block;position:relative;margin-bottom:18px}
.stance-status-txt{font-family:'Bangers',cursive;font-size:1.5rem;letter-spacing:.08em;margin-bottom:6px;min-height:1.8rem;transition:color .3s}
.stance-status-txt.idle{color:var(--text-muted)}
.stance-status-txt.holding{color:var(--red);animation:pulse-r 1s ease-in-out infinite}
.stance-status-txt.done{color:var(--jade)}
@keyframes pulse-r{0%,100%{opacity:1}50%{opacity:.45}}
.stance-countdown-txt{font-size:3.2rem;font-family:'Bangers',cursive;color:var(--text);margin-bottom:2px}
.stance-target-txt{font-size:.95rem;color:var(--text-muted);margin-bottom:3px;font-weight:700}
.stance-best-txt{font-size:.88rem;color:var(--text-dim);margin-bottom:20px;font-weight:700}
.stance-setup-txt{color:var(--text-muted);font-style:italic;font-size:1rem;margin-bottom:22px;line-height:1.75;font-weight:600}

/* === FIVE ANIMALS === */
.animals-prompt{text-align:center;font-family:'Bangers',cursive;font-size:1.2rem;color:var(--gold);margin-bottom:20px;letter-spacing:.05em}
.animals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-bottom:22px}
.animal-card{background:var(--bg-card);border:2px solid var(--wood-l);border-radius:var(--r);padding:16px 10px;text-align:center;cursor:pointer;transition:all var(--tr)}
.animal-card:hover{border-color:var(--jade);background:var(--bg-card-h);transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.animal-card.selected{border-color:var(--gold);background:var(--bg-card-h);box-shadow:0 0 22px var(--gold-glow)}
.animal-em{font-size:2.6rem;display:block;margin-bottom:8px}
.animal-nm{font-family:'Bangers',cursive;font-size:.95rem;color:var(--text);margin-bottom:4px;letter-spacing:.04em}
.animal-pw{font-size:.82rem;color:var(--jade);font-style:italic;font-weight:700}
.animal-detail{background:var(--bg-card);border:2px solid rgba(255,184,0,.3);border-radius:var(--r);padding:20px;animation:fadein .3s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.animal-detail h4{font-family:'Bangers',cursive;color:var(--gold);margin-bottom:12px;font-size:1.2rem;letter-spacing:.04em}
.animal-detail p{color:var(--text-muted);font-size:1rem;line-height:1.75;margin-bottom:8px;font-weight:600}
.animal-feel{font-style:italic;color:var(--jade);font-size:.95rem;font-weight:700}

/* === CUP === */
.cup-section{text-align:center}
.cup-intro{color:var(--text-muted);font-size:1rem;font-style:italic;margin-bottom:18px;font-weight:600}
.emotion-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:18px}
.etag{padding:6px 15px;background:var(--bg-card);border:2px solid var(--wood-l);border-radius:20px;font-size:.9rem;color:var(--text-muted);cursor:pointer;transition:all var(--tr);font-weight:700}
.etag:hover{border-color:var(--red);color:var(--text)}
.etag.added{background:rgba(232,57,43,.15);border-color:rgba(232,57,43,.4);color:var(--red)}
.cup-mantra{font-style:italic;color:var(--text-muted);font-size:1rem;margin-top:18px;padding:16px 20px;background:var(--bg-card);border-left:3px solid var(--gold);border-radius:0 var(--r) var(--r) 0;display:none;text-align:left;font-weight:600;line-height:1.75}
.cup-mantra.vis{display:block;animation:fadein .4s ease}
.cup-reset-btn{margin-top:14px}

/* === MINDFULNESS === */
.mindful-section{text-align:center;padding:28px;background:var(--bg-card);border:2px solid var(--wood-l);border-radius:var(--rl)}
.bell-btn{font-size:3rem;background:none;border:3px solid var(--wood-l);border-radius:50%;width:110px;height:110px;cursor:pointer;transition:all var(--tr);display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px}
.bell-btn:hover{border-color:var(--gold);box-shadow:0 0 32px var(--gold-glow);transform:scale(1.07)}
.bell-btn.ringing{animation:bell-r .55s ease;border-color:var(--gold);box-shadow:0 0 40px var(--gold-glow)}
@keyframes bell-r{0%,100%{transform:rotate(0)}15%{transform:rotate(9deg)}45%{transform:rotate(-9deg)}75%{transform:rotate(4deg)}95%{transform:rotate(-4deg)}}
.mindful-guide{color:var(--text-muted);font-style:italic;font-size:1.05rem;line-height:1.9;min-height:65px;max-width:440px;margin:0 auto;font-weight:600}
.mindful-tap{font-family:'Bangers',cursive;font-size:.88rem;color:var(--text-dim);letter-spacing:.1em;margin-bottom:18px}

/* === KINDNESS === */
.metta-section{background:var(--bg-card);border:2px solid var(--wood-l);border-radius:var(--rl);padding:28px;text-align:center}
.metta-intro{color:var(--text-muted);font-size:1rem;font-style:italic;margin-bottom:24px;line-height:1.8;font-weight:600}
.metta-input-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.metta-lbl{font-size:.9rem;color:var(--text-dim);font-family:'Bangers',cursive;letter-spacing:.06em;min-width:110px;text-align:right}
.metta-inp{background:none;border:none;border-bottom:2px solid var(--gold);color:var(--gold);font-family:'Fredoka',sans-serif;font-size:1rem;font-weight:700;text-align:left;min-width:140px;outline:none;padding:3px 4px}
.metta-text-area{margin-top:22px;padding:20px;background:var(--bg-panel);border-radius:var(--r);text-align:left;border-left:3px solid rgba(255,184,0,.35)}
.metta-line{font-size:1rem;color:var(--text-muted);line-height:2.3;font-style:italic;font-weight:600}
.metta-line .mname{color:var(--gold);font-style:normal;font-family:'Bangers',cursive;letter-spacing:.04em}

/* === FORM STEPPER === */
.form-stepper{background:var(--bg-card);border:2px solid var(--wood-l);border-radius:var(--rl);overflow:hidden}
.form-prog-bar{height:5px;background:var(--wood)}
.form-prog-fill{height:100%;background:var(--red);transition:width .4s ease}
.form-step-body{padding:32px;text-align:center}
.fs-num{font-family:'Bangers',cursive;font-size:.88rem;color:var(--text-dim);letter-spacing:.14em;margin-bottom:8px}
.fs-em{font-size:3.5rem;display:block;margin-bottom:14px}
.fs-name{font-family:'Bangers',cursive;font-size:1.6rem;color:var(--gold);margin-bottom:12px;letter-spacing:.04em}
.fs-desc{color:var(--text-muted);font-size:1rem;line-height:1.85;max-width:400px;margin:0 auto 28px;font-weight:600}
.form-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 26px;border-top:2px solid var(--wood)}
.form-step-dots{display:flex;gap:7px}
.fsdot{width:8px;height:8px;border-radius:50%;background:var(--wood);transition:background var(--tr)}
.fsdot.active{background:var(--red)}
.fsdot.done{background:var(--jade)}

/* === VOW BUILDER === */
.vow-builder{background:var(--bg-card);border:2px solid rgba(255,184,0,.28);border-radius:var(--rl);padding:30px}
.vb-title{font-family:'Bangers',cursive;color:var(--gold);font-size:1.2rem;letter-spacing:.06em;margin-bottom:6px}
.vb-intro{color:var(--text-muted);font-size:1rem;font-style:italic;margin-bottom:24px;line-height:1.8;font-weight:600}
.vow-field{margin-bottom:20px}
.vow-lbl{font-size:.88rem;color:var(--text-dim);font-family:'Bangers',cursive;letter-spacing:.08em;margin-bottom:7px;display:block}
.vow-inp{width:100%;padding:12px 16px;background:var(--bg-panel);border:2px solid var(--wood-l);border-radius:var(--r);color:var(--text);font-family:'Fredoka',sans-serif;font-size:1rem;font-weight:600;outline:none;transition:border-color var(--tr),box-shadow var(--tr);resize:none}
.vow-inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
.sig-area{margin-top:24px;text-align:center}
.sig-line-wrap{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sig-line{flex:1;height:1px;background:var(--gold);opacity:.35}
.sig-label{font-family:'Bangers',cursive;font-size:.82rem;color:var(--text-dim);letter-spacing:.1em}
.monk-name-display{font-family:'Bangers',cursive;color:var(--gold);font-size:1.2rem;margin-bottom:6px;letter-spacing:.04em}

/* === CEREMONY === */
#ceremony-overlay{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.particles-canvas{position:absolute;inset:0;pointer-events:none}
.ceremony-inner{text-align:center;max-width:460px;width:100%;position:relative;z-index:2}
.cer-em{font-size:6rem;display:block;margin-bottom:16px;animation:cerpop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes cerpop{from{transform:scale(0) rotate(-12deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.cer-label{font-family:'Bangers',cursive;font-size:1rem;color:var(--red);letter-spacing:.3em;text-transform:uppercase;margin-bottom:12px;animation:fiu .5s .2s both}
.cer-title{font-family:'Bangers',cursive;font-size:clamp(1.8rem,6vw,3rem);color:var(--gold);margin-bottom:8px;animation:fiu .5s .3s both;letter-spacing:.05em;text-shadow:0 0 30px rgba(255,184,0,.5)}
.cer-skill{color:var(--text-muted);font-style:italic;margin-bottom:30px;animation:fiu .5s .4s both;font-size:1.05rem;font-weight:600}
.cer-promo{background:var(--bg-card);border:2px solid var(--gold);border-radius:var(--rl);padding:24px;margin-bottom:30px;animation:fiu .5s .5s both}
.cer-promo-label{font-family:'Bangers',cursive;font-size:.88rem;color:var(--gold);letter-spacing:.16em;text-transform:uppercase;margin-bottom:6px}
.cer-promo-title{font-family:'Bangers',cursive;font-size:1.6rem;color:var(--text);margin-bottom:6px;letter-spacing:.04em}
.cer-promo-desc{font-size:.95rem;color:var(--text-muted);font-style:italic;font-weight:600}
.cer-vows{background:var(--bg-card);border:1px solid rgba(255,184,0,.3);border-radius:var(--r);padding:20px;margin-bottom:26px;text-align:left;animation:fiu .5s .5s both}
.cer-vow-line{font-style:italic;color:var(--text-muted);font-size:.95rem;line-height:2.2;border-left:3px solid var(--gold);padding-left:14px;margin-bottom:8px;font-weight:600}
@keyframes fiu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* === SESSION LOG === */
#session-log-drawer{position:fixed;right:0;top:0;bottom:0;width:min(380px,100vw);background:var(--bg-panel);border-left:2px solid var(--wood-l);z-index:300;transform:translateX(100%);transition:transform .3s ease;overflow-y:auto;padding:24px}
#session-log-drawer.open{transform:translateX(0)}
.drawer-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.drawer-ttl{font-family:'Bangers',cursive;font-size:1.3rem;color:var(--gold);letter-spacing:.05em}
.drawer-close{background:none;border:none;color:var(--text-dim);font-size:1.3rem;cursor:pointer;transition:color var(--tr)}
.drawer-close:hover{color:var(--text)}
.streak-box{background:var(--bg-card);border:2px solid var(--wood-l);border-radius:var(--r);padding:16px;text-align:center;margin-bottom:20px}
.streak-num{font-family:'Bangers',cursive;font-size:2.8rem;color:var(--red);display:block;text-shadow:0 0 16px var(--red-glow)}
.streak-lbl{font-size:.9rem;color:var(--text-muted);font-family:'Bangers',cursive;letter-spacing:.08em}
.log-entries{display:flex;flex-direction:column;gap:10px}
.log-entry{background:var(--bg-card);border:1px solid var(--wood-l);border-radius:var(--r);padding:13px 15px}
.log-entry-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.log-sname{font-family:'Bangers',cursive;font-size:.95rem;color:var(--text);letter-spacing:.04em}
.log-date{font-size:.82rem;color:var(--text-dim);font-weight:600}
.log-type{font-size:.88rem;color:var(--text-muted);font-style:italic;font-weight:600}
.log-type.completed{color:var(--gold)}
.log-empty{text-align:center;color:var(--text-dim);font-size:.95rem;font-style:italic;padding:32px 0;font-weight:600}

/* === SESSION TIMER ROW === */
.session-timer-row{display:flex;align-items:center;gap:10px;margin-bottom:24px;padding:10px 16px;background:var(--bg-card);border:1px solid var(--wood-l);border-radius:var(--r);flex-wrap:wrap}
.session-timer-label{font-family:'Bangers',cursive;font-size:.88rem;color:var(--text-dim);letter-spacing:.06em}
.session-timer-val{font-family:'Bangers',cursive;font-size:1.4rem;color:var(--gold);min-width:3rem;letter-spacing:.04em}
.session-timer-hint{font-size:.82rem;color:var(--text-dim);font-style:italic;font-weight:600;margin-left:auto}

/* === PRACTICE PROGRESS === */
.practice-stamps{display:inline-flex;gap:4px;align-items:center;margin-right:10px}
.practice-stamp{font-size:1.1rem;line-height:1}
.practice-count{font-family:'Bangers',cursive;font-size:.9rem;color:var(--text-muted);letter-spacing:.04em;vertical-align:middle}
.practiced-today-badge{display:inline-flex;align-items:center;font-family:'Bangers',cursive;font-size:.88rem;color:var(--jade);padding:6px 14px;border:2px solid rgba(82,192,80,.35);border-radius:20px;background:var(--jade-glow);letter-spacing:.04em}

/* === SLIDE SYSTEM === */
.slide-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0 16px;gap:10px;border-bottom:1px solid var(--wood-l);margin-bottom:20px}
.sh-mini{display:flex;align-items:center;gap:8px;overflow:hidden}
.sh-mini-emoji{font-size:1.3rem;flex-shrink:0}
.sh-mini-name{font-family:'Bangers',cursive;font-size:.9rem;color:var(--text-muted);letter-spacing:.04em;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sh-timer-mini{font-family:'Bangers',cursive;font-size:1rem;color:var(--gold);white-space:nowrap;flex-shrink:0}
.slide-stage{min-height:50vh;padding-bottom:20px}
.slide-nav-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 0;margin-bottom:16px;border-top:1px solid var(--wood-l);gap:8px}
.slide-dots-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.slide-dots{display:flex;gap:10px;align-items:center}
.sdot{width:9px;height:9px;border-radius:50%;background:var(--wood-l);cursor:pointer;transition:background var(--tr),transform var(--tr),opacity var(--tr);flex-shrink:0}
.sdot.active{background:var(--gold);transform:scale(1.45)}
.sdot.done{background:var(--jade);opacity:.65}
.slide-label-txt{font-family:'Bangers',cursive;font-size:.82rem;color:var(--text-dim);letter-spacing:.07em}
.slide-anim-fwd{animation:sldFwd .22s ease-out}
.slide-anim-back{animation:sldBack .22s ease-out}
@keyframes sldFwd{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:none}}
@keyframes sldBack{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:none}}
/* === BELT SYSTEM === */
.belt-active-badge{display:inline-flex;align-items:center;gap:7px;font-family:'Bangers',cursive;font-size:.95rem;color:var(--gold);padding:6px 14px;border:2px solid rgba(255,184,0,.35);border-radius:20px;background:rgba(255,184,0,.07);letter-spacing:.05em;margin-bottom:12px}
.belt-note{background:rgba(255,184,0,.06);border-left:3px solid rgba(255,184,0,.4);border-radius:0 var(--r) var(--r) 0;padding:10px 14px;font-size:.9rem;color:var(--text-muted)}
.belt-pips-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.belt-pip{font-size:.88rem;font-family:'Bangers',cursive;letter-spacing:.04em;padding:4px 10px;border-radius:12px;transition:opacity var(--tr)}
.belt-pip.earned{background:rgba(255,184,0,.18);color:var(--gold);border:1.5px solid rgba(255,184,0,.5)}
.belt-pip.working{background:rgba(255,109,0,.12);color:#ff6d00;border:1.5px dashed rgba(255,109,0,.5);opacity:.85}
.belt-pip.dim{opacity:.25;color:var(--text-dim);border:1.5px solid rgba(255,255,255,.1)}
.belt-stamps-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:.88rem}
.card-belts{display:flex;gap:5px;margin-top:8px;align-items:center}
.card-belt-pip{font-size:.75rem;padding:2px 7px;border-radius:10px;font-family:'Bangers',cursive;letter-spacing:.03em}
.card-belt-pip.earned{background:rgba(255,184,0,.2);color:var(--gold);border:1px solid rgba(255,184,0,.4)}
.card-belt-pip.working{background:rgba(255,109,0,.1);color:#ff6d00;border:1px dashed rgba(255,109,0,.4)}
.card-belt-pip.dim{opacity:.25;color:var(--text-dim);border:1px solid rgba(255,255,255,.1)}
.stance-challenge-note{background:rgba(255,109,0,.1);border:1.5px solid rgba(255,109,0,.35);border-radius:var(--r);padding:10px 14px;margin-bottom:14px;font-size:.9rem;color:#ff8c40;font-weight:700}
.breath478-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;width:140px;height:140px;margin:0 auto 16px}
.breath478-circle{width:130px;height:130px;border-radius:50%;background:var(--jade);transition:transform .4s ease,background .4s ease;transform:scale(1);position:absolute}
.breath478-label{position:relative;font-family:'Bangers',cursive;font-size:1.2rem;color:#fff;z-index:1;pointer-events:none;letter-spacing:.08em;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.form-timed{text-align:center;padding:10px 0}
.ft-intro{font-size:.92rem;color:var(--text-muted);margin-bottom:14px}
.ft-steps-list{text-align:left;display:inline-block;margin:0 auto 16px;font-size:.9rem;color:var(--text-muted);line-height:1.8}
.ft-display{font-family:'Bangers',cursive;font-size:3rem;color:var(--gold);letter-spacing:.05em;margin:10px 0}
.ft-best{font-family:'Bangers',cursive;font-size:1rem;color:var(--jade);margin-bottom:12px;letter-spacing:.04em}
.form-reveal summary{cursor:pointer;margin-top:8px;display:inline-flex;align-items:center;gap:4px}
.form-reveal .fs-desc{margin-top:8px}
.video-toggle{background:none;border:1.5px solid rgba(255,184,0,.35);color:var(--gold);font-family:'Bangers',cursive;font-size:.88rem;letter-spacing:.05em;padding:5px 14px;border-radius:16px;cursor:pointer;margin-top:10px;display:inline-flex;align-items:center;gap:6px;transition:background var(--tr)}
.video-toggle:hover{background:rgba(255,184,0,.1)}

const MUSIC_TRACKS = ['assets/music/Bamboo Path.mp3','assets/music/Bamboo Path-2.mp3'];
let musicIdx = 0;
let musicMuted = localStorage.getItem('shaolin_mute') === '1';
const musicAudio = new Audio();
musicAudio.volume = 0.35;

function musicNext(){
  musicIdx = (musicIdx + 1) % MUSIC_TRACKS.length;
  musicAudio.src = MUSIC_TRACKS[musicIdx];
  if(!musicMuted) musicAudio.play().catch(()=>{});
}
musicAudio.addEventListener('ended', musicNext);

function startMusic(){
  if(musicAudio.src) return;
  musicAudio.src = MUSIC_TRACKS[0];
  if(!musicMuted) musicAudio.play().catch(()=>{});
}

function toggleMusic(){
  musicMuted = !musicMuted;
  localStorage.setItem('shaolin_mute', musicMuted ? '1' : '0');
  const btn = document.getElementById('nav-sound-btn');
  if(musicMuted){
    musicAudio.pause();
    if(btn) btn.textContent = '🔇';
  } else {
    if(!musicAudio.src) musicAudio.src = MUSIC_TRACKS[0];
    musicAudio.play().catch(()=>{});
    if(btn) btn.textContent = '🔊';
  }
}

function updateSoundBtn(){
  const btn = document.getElementById('nav-sound-btn');
  if(btn) btn.textContent = musicMuted ? '🔇' : '🔊';
}

// Start on first user interaction (browsers block autoplay before gesture)
let musicStarted = false;
function onFirstInteraction(){
  if(musicStarted) return;
  musicStarted = true;
  startMusic();
  document.removeEventListener('click', onFirstInteraction);
  document.removeEventListener('keydown', onFirstInteraction);
}
document.addEventListener('click', onFirstInteraction);
document.addEventListener('keydown', onFirstInteraction);

  green:  { emoji:'🟢', label:'Green Belt',  color:'#44cc44', title:'Warrior I'     },
  blue:   { emoji:'🔵', label:'Blue Belt',   color:'#2288ff', title:'Warrior II'    },
  brown:  { emoji:'🟤', label:'Brown Belt',  color:'#c07030', title:'Master I'      },
  black:  { emoji:'⚫', label:'Black Belt',  color:'#555555', title:'Master II'     },

};

let stopParticles = null;

function loadState(){
  try{
    const saved = localStorage.getItem('shaolin_state');
    if(saved) state = {...state,...JSON.parse(saved)};
    if(!state.scrollProgress) state.scrollProgress = {...DEFAULT_SCROLLS};
    if(!state.sessions) state.sessions = [];
    if(!state.vows) state.vows = {1:'',2:'',3:''};
    if(!state.formTimedBest) state.formTimedBest = 0;
    SCROLLS.forEach(s=>{
      const sp = state.scrollProgress[s.id];
      if(!sp){ state.scrollProgress[s.id] = {...DEFAULT_SCROLLS[s.id]}; return; }
      if(!sp.beltDays) sp.beltDays = {yellow:sp.practiceDays||[],orange:[],black:[]};
      BELT_ORDER.forEach(b=>{ if(!sp.beltDays[b]) sp.beltDays[b]=[]; });
      // Migrate old earnedBelts or old 3-belt state.belt into new 7-belt system
      if(sp.earnedBelts){
        const eb = sp.earnedBelts;
        if(eb.includes('black') && (!state.belt || BELT_ORDER.indexOf(state.belt)<5)) state.belt='black';
        else if(eb.includes('orange') && (!state.belt || BELT_ORDER.indexOf(state.belt)<3)) state.belt='blue';
        else if(eb.includes('yellow') && (!state.belt || BELT_ORDER.indexOf(state.belt)<1)) state.belt='orange';
        delete sp.earnedBelts;
      }
    });
  } catch(e){}
}

function saveState(){
  try{ localStorage.setItem('shaolin_state', JSON.stringify(state)); } catch(e){}
}

/* ═══════════════════════════════════════════════════════

═══════════════════════════════════════════════════════ */
function playBell(freq=830, duration=2.2){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq*0.5, ctx.currentTime+duration);
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+duration);
    osc.type='sine'; osc.start(); osc.stop(ctx.currentTime+duration);
  } catch(e){}
}

function playComplete(){
  playBell(660, 1); setTimeout(()=>playBell(880,1.5), 300);
}

function playCeremony(){
  [440,554,659].forEach((f,i)=>setTimeout(()=>playBell(f,2),i*200));
}

function getWorkingBelt(){
  if(!state.belt) return 'yellow';
  const idx = BELT_ORDER.indexOf(state.belt);
  if(idx >= BELT_ORDER.length-1) return 'black';
  return BELT_ORDER[idx+1];
}
function getWorkingTrainingTier(){ return BELT_TIER[getWorkingBelt()]; }
function getWorkingBeltIdx(){ return BELT_ORDER.indexOf(getWorkingBelt()); }
function getMaxBeltTier(){
  if(['blue','brown','black'].includes(state.belt)) return 2;
  if(['orange','green'].includes(state.belt)) return 1;
  return 0;
}

function getRank(){
  const b = state.belt || 'white';
  const bm = BELT_META[b];
  const quotes = {
    white: '"Every master was once a beginner."',
    yellow:'"One foot on the path — keep walking."',
    orange:'"Foundation complete — the temple doors open wider."',
    green: '"The student becomes the practitioner."',
    blue:  '"Discipline shapes the warrior within."',
    brown: '"Strength and wisdom walk together."',
    black: '"The journey makes the master."',
  };
  return { rank:b, title:`${bm.label}`, emoji:bm.emoji, quote:quotes[b] };
}

function scrollsReadyAt(trainingTier){
  return SCROLLS.filter(s=>(state.scrollProgress[s.id]?.beltDays?.[trainingTier]||[]).length>=BELT_SESSIONS).length;
}
function allReadyForBelt(){
  if(state.belt==='black') return false;
  const wb = getWorkingBelt();
  return scrollsReadyAt(BELT_TIER[wb]) >= BELT_THRESHOLD[wb];
}
function getCompletedCount(){
  const wb = getWorkingBelt();
  return Math.min(scrollsReadyAt(BELT_TIER[wb]), BELT_THRESHOLD[wb]);
}

function getCurrentScrollId(){
  const sp = SCROLLS.find(s=>state.scrollProgress[s.id]?.status==='active');
  return sp ? sp.id : null;
}

function formatDate(dateStr){
  if(!dateStr) return '';
  try{
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  } catch(e){ return ''; }
}

function getStreak(){
  if(!state.sessions.length) return 0;
  const dates = [...new Set(state.sessions.map(s=>s.date.split('T')[0]))].sort().reverse();
  const today = new Date().toISOString().split('T')[0];
  if(dates[0]!==today){
    const yesterday = new Date(Date.now()-86400000).toISOString().split('T')[0];
    if(dates[0]!==yesterday) return 0;
  }
  let streak=1;
  for(let i=1;i<dates.length;i++){
    const diff = (new Date(dates[i-1]) - new Date(dates[i])) / 86400000;
    if(diff===1) streak++;
    else break;
  }
  return streak;
}

function logSession(scrollId, type){
  state.sessions.unshift({date:new Date().toISOString(),scrollId,type});
  if(state.sessions.length>100) state.sessions.length=100;
  saveState();
}

function renderPathView(){
  const el = document.getElementById('path-content');
  if(!el) return;
  const wb = getWorkingBelt();
  const tier = getWorkingTrainingTier();
  const bm = BELT_META[wb];
  let markedCurrent = false;
  function resolvedState(id){
    const sp = state.scrollProgress[id]||{};
    const days = (sp.beltDays?.[tier]||[]).length;
    if(days >= BELT_SESSIONS) return 'reached';
    if(!markedCurrent){ markedCurrent = true; return 'current'; }
    return 'ahead';
  }
  function sessionPips(id){
    const sp = state.scrollProgress[id]||{};
    const days = Math.min((sp.beltDays?.[tier]||[]).length, BELT_SESSIONS);
    return Array.from({length:BELT_SESSIONS},(_,i)=>
      `<span style="font-size:.8rem">${i<days?'🌟':'⬜'}</span>`
    ).join('');
  }
  function nodeHTML(scroll){
    const st = resolvedState(scroll.id);
    const sp = state.scrollProgress[scroll.id]||{};
    const days = Math.min((sp.beltDays?.[tier]||[]).length, BELT_SESSIONS);
    return `<div class="path-node" onclick="goToScroll(${scroll.id});showView('scroll')">
      <div class="path-node-icon ${st}">${scroll.emoji}</div>

        <div class="path-node-skill">${scroll.skill}</div>

          ${sessionPips(scroll.id)}
          <span style="font-size:.75rem;color:var(--text-muted)">${days}/${BELT_SESSIONS} ${bm.emoji}</span>
        </div>
      </div>
    </div>`;
  }
  const connector = `<div class="path-connector"></div>`;
  const zones = [
    {rank:'white',  emoji:'⚪', label:'Foundation — Yellow Belt', scrollIds:[1,2,3,4], req:'Complete 3 sessions per scroll · earn Yellow Belt at 4 scrolls', awardBelt:'yellow'},
    {rank:'yellow', emoji:'🟡', label:'Foundation — Orange Belt', scrollIds:[5,6,7,8], req:'Complete Foundation training · earn Orange Belt at all 8 scrolls', awardBelt:'orange'},
  ];
  const r = getRank();
  let html = `<div class="path-title">⛩️ THE PATH OF THE YOUNG MONK</div>
    <div style="text-align:center;margin-bottom:24px;font-size:.88rem;color:var(--text-muted)">
      You are: <strong style="color:var(--jade)">${r.emoji} ${r.title}</strong>
    </div>`;
  zones.forEach((zone, zi) => {
    const prize = BELT_PRIZES[zone.awardBelt];
    const prizeHtml = prize ? `<div class="path-prize">
      <div class="path-prize-header">🎁 ${BELT_META[zone.awardBelt].emoji} ${BELT_META[zone.awardBelt].label} prize</div>
      ${prize.rewards.map(r=>`<div class="path-prize-row"><span class="path-prize-icon">${r.icon}</span><span>${r.text}</span></div>`).join('')}
    </div>` : '';
    html += `<div class="path-zone">
      <div class="path-zone-banner ${zone.rank}"><span>${zone.emoji}</span><span>${zone.label}</span></div>
      <div style="font-size:.8rem;color:var(--text-dim);margin-bottom:10px;padding-left:4px">${zone.req}</div>
      ${prizeHtml}
      <div style="height:10px"></div>`;
    zone.scrollIds.forEach((id, i) => {
      const scroll = SCROLLS.find(s=>s.id===id);
      if(!scroll) return;
      if(i > 0) html += connector;
      html += nodeHTML(scroll);
    });
    html += `</div>`;
    if(zi < zones.length-1) html += connector;
  });
  const warriorUnlocked = ['orange','green','blue','brown','black'].includes(state.belt);
  const masterUnlocked  = ['blue','brown','black'].includes(state.belt);

  html += connector;
  html += `<div class="path-zone" style="${warriorUnlocked?'':'opacity:.5'}">
    <div class="path-zone-banner green"><span>🟢</span><span>Warrior Training — Green &amp; Blue Belt</span>${warriorUnlocked?'':' 🔒'}</div>
    <div style="font-size:.8rem;color:var(--text-dim);margin-bottom:10px;padding-left:4px">${warriorUnlocked?'Harder techniques · same 8 scrolls · earn Green Belt at 4, Blue Belt at 8':'Earn Orange Belt to unlock Warrior training'}</div>
    ${warriorUnlocked?'':BELT_PRIZES.green.rewards.map(r=>`<div class="path-prize-row" style="padding:4px 0"><span class="path-prize-icon">${r.icon}</span><span style="font-size:.8rem;color:var(--text-dim)">${r.text}</span></div>`).join('')}
  </div>`;

  html += connector;
  html += `<div class="path-zone" style="${masterUnlocked?'':'opacity:.4'}">
    <div class="path-zone-banner blue"><span>🔵</span><span>Master Training — Brown &amp; Black Belt</span>${masterUnlocked?'':' 🔒'}</div>

function renderCurrentSlide(id, dir){
  const scroll = SCROLLS.find(s=>s.id===id);
  if(!scroll) return;

  const wb = getWorkingBelt();
  const bm = BELT_META[wb];
  const trainingTier = getWorkingTrainingTier();
  const wbIdx = ['yellow','orange','black'].indexOf(trainingTier);
  const level = scroll.levels?.[wbIdx];
  const practices = level ? level.practices : scroll.practices;
  const interactiveNote = level?.interactiveNote || '';
  const total = SLIDE_LABELS.length;

  // Nav bar
  const navBar = document.getElementById('slide-nav-bar');
  if(navBar){
    const dots = SLIDE_LABELS.map((_,i)=>
      `<span class="sdot ${i===scrollSlide?'active':i<scrollSlide?'done':''}" onclick="jumpToSlide(${id},${i})" title="${SLIDE_LABELS[i]}"></span>`
    ).join('');
    navBar.innerHTML = `
      <button class="btn btn-outline btn-sm" onclick="goPrevSlide(${id})" ${scrollSlide===0?'disabled style="opacity:.3"':''}>← Back</button>
      <div class="slide-dots-wrap">
        <div class="slide-dots">${dots}</div>
        <div class="slide-label-txt">${SLIDE_LABELS[scrollSlide]}</div>
      </div>
      ${scrollSlide===total-1?'<span style="width:80px"></span>':`<button class="btn btn-primary btn-sm" onclick="goNextSlide(${id})">Next →</button>`}
    `;
  }

  // Slide content
  const stage = document.getElementById('slide-stage');
  if(!stage) return;

  let html = '';
  switch(scrollSlide){
    case 0: // LEARN — story + practice list
      html = `
        <div class="scroll-hero">
          <span class="sh-emoji">${scroll.emoji}</span>
          <div class="sh-num">Scroll ${scroll.id} of 8</div>
          <h2>${scroll.name}</h2>
          <span class="skill-tag">${scroll.skill}</span>
        </div>
        <div class="s-section">
          <div class="s-label">The Story</div>
          <div class="story-box">${scroll.story}</div>
        </div>
        <div class="s-section">
          <div class="belt-active-badge">${bm.emoji} Working toward ${bm.label} &middot; ${bm.title}</div>
          <div class="s-label">Practice</div>
          <ul class="prac-list">${practices.map(p=>`<li>${p}</li>`).join('')}</ul>
          ${interactiveNote?`<div class="belt-note" style="margin-top:14px"><strong>${bm.emoji} Focus:</strong> ${interactiveNote}</div>`:''}
        </div>
      `;
      break;
    case 1: // TRAIN — interactive + inline log action
      html = `
        <div class="s-section" id="interactive-section"></div>
        <div id="inline-log-actions" style="margin-top:24px;text-align:center;padding-bottom:8px"></div>
      `;
      break;
    case 2: // APPLY — roleplay + real-life + inline belt progress + return
      html = `
        <div class="s-section">
          <div class="roleplay-box"><p>${scroll.roleplay.replace(/\[Name\]/g,state.monkName||'[Name]')}</p></div>
        </div>
        <div class="s-section">
          <div class="real-life-box"><p>${scroll.realLifeLink}</p></div>
        </div>
        <div id="inline-log-actions" style="margin-top:24px;text-align:center;padding-bottom:8px"></div>
        <div style="text-align:center;margin-top:12px;padding-bottom:8px">
          <button class="btn btn-outline" onclick="goHome()">← Return to Temple</button>
        </div>
      `;
      break;
  }

  stage.className = 'slide-stage slide-anim-'+(dir==='back'?'back':'fwd');
  stage.innerHTML = html;

  if(scrollSlide===1) renderInteractive(scroll, wbIdx);
  renderInlineActions(id);
}

function goNextSlide(id){
  if(scrollSlide >= SLIDE_LABELS.length-1) return;
  stopInteractiveTimers();
  scrollSlide++;
  renderCurrentSlide(id,'fwd');
}

function goPrevSlide(id){
  if(scrollSlide <= 0) return;
  stopInteractiveTimers();
  scrollSlide--;
  renderCurrentSlide(id,'back');
}

function jumpToSlide(id, idx){
  if(idx===scrollSlide) return;
  stopInteractiveTimers();
  const dir = idx > scrollSlide ? 'fwd' : 'back';
  scrollSlide = idx;
  renderCurrentSlide(id, dir);
}

function renderInlineActions(id){
  const el = document.getElementById('inline-log-actions');
  if(!el) return;
  const sp = state.scrollProgress[id];
  if(!sp) return;
  const wb = getWorkingBelt();
  const tier = BELT_TIER[wb];
  const bm = BELT_META[wb];
  const wbDays = sp.beltDays?.[tier]||[];
  const today = new Date().toISOString().split('T')[0];
  const practicedToday = wbDays.includes(today);
  const count = Math.min(wbDays.length, BELT_SESSIONS);
  const ready = count >= BELT_SESSIONS;
  const mastered = state.belt==='black' && ready;

  const stamps = Array.from({length:BELT_SESSIONS},(_,i)=>
    `<span class="practice-stamp ${i<count?'done':''}">${i<count?'🌟':'⬜'}</span>`
  ).join('');

  let html = `<div class="inline-progress-row">
    <span style="font-size:1.1rem">${bm.emoji}</span>
    <span class="practice-stamps">${stamps}</span>
    <span class="practice-count">${count}/${BELT_SESSIONS} ${bm.label}</span>
  </div>`;

  if(mastered){
    html += `<div class="practiced-today-badge" style="margin-top:10px">⚫ Black Belt mastered!</div>`;
  } else if(ready){
    html += `<div class="practiced-today-badge" style="margin-top:10px;color:var(--jade)">✓ This scroll is ready — complete all 8 to earn your ${bm.emoji} ${bm.label}!</div>`;
  } else if(practicedToday){
    html += `<div class="practiced-today-badge" style="margin-top:10px">✓ Practised today — come back tomorrow!</div>`;
  } else {
    html += `<button class="btn btn-primary btn-lg" style="margin-top:12px" onclick="logPracticeDay(${id})">✓ Log Today's Practice</button>`;
  }
  el.innerHTML = html;
}

function renderBeltBar(id){

  const wb = getWorkingBelt();

function logPracticeDay(id){

function breathing478Start(){

}
function breathing478Next(){
  if(!breathing478.running) return;
  const p=BREATHING478_PHASES[breathing478.phaseIdx];
  const circle=document.getElementById('b478-circle');
  if(circle){circle.style.background=p.color;circle.style.transform='scale('+p.scale+')';}
  el('b-phase',p.label);
  breathing478.count=p.dur; el('b-count',String(breathing478.count));
  el('b-rounds',`Round ${breathing478.round} of 5`);
  clearInterval(breathing478.interval);
  breathing478.interval=setInterval(()=>{
    breathing478.count--;
    el('b-count',String(Math.max(0,breathing478.count)));
    if(breathing478.count<=0){
      clearInterval(breathing478.interval);
      breathing478.phaseIdx++;
      if(breathing478.phaseIdx>=BREATHING478_PHASES.length){
        breathing478.phaseIdx=0; breathing478.round++;

function breathing478Clear(){

function breathingStart(){
  if(breathing.running&&!breathing.paused){ breathingPause(); return; }
  if(breathing.paused){ breathingResume(); return; }
  breathing.running=true; breathing.paused=false;
  breathing.round=1; breathing.elapsed=0; breathing.lastTs=null;
  document.getElementById('b-done-msg')?.classList.add('hidden');
  const dot = document.getElementById('b-dot');
  if(dot) dot.style.opacity='1';
  const btn = document.getElementById('b-start-btn');
  if(btn) btn.textContent='Pause';
  breathing.animFrame = requestAnimationFrame(breathingTick);

function breathingPause(){
  breathing.paused=true;
  cancelAnimationFrame(breathing.animFrame);
  const btn = document.getElementById('b-start-btn');
  if(btn) btn.textContent='Resume';
}

function breathingResume(){
  breathing.paused=false;
  breathing.lastTs=null;
  const btn = document.getElementById('b-start-btn');
  if(btn) btn.textContent='Pause';
  breathing.animFrame = requestAnimationFrame(breathingTick);
}

function breathingReset(){
  breathing.running=false; breathing.paused=false;
  cancelAnimationFrame(breathing.animFrame);
  breathing.elapsed=0; breathing.round=1; breathing.lastTs=null;
  const dot=document.getElementById('b-dot'); if(dot){dot.setAttribute('cx','48');dot.setAttribute('cy','48');dot.style.opacity='0';}
  const box=document.getElementById('b-box'); if(box) box.setAttribute('stroke','#2a4820');
  el('b-phase','Ready to begin'); el('b-count','—'); el('b-rounds',`${breathing.total} rounds total`);
  el_btn('b-start-btn','Start');
  document.getElementById('b-done-msg')?.classList.add('hidden');
}

function breathingTick(ts){
  if(!breathing.running||breathing.paused) return;
  if(!breathing.lastTs) breathing.lastTs=ts;
  breathing.elapsed += (ts-breathing.lastTs)/1000;
  breathing.lastTs=ts;

  if(breathing.elapsed>=breathing.cycleTime){
    breathing.elapsed-=breathing.cycleTime;
    breathing.round++;
    if(breathing.round>breathing.total){
      breathing.running=false;
      playComplete();
      el('b-phase','Complete!'); el('b-count','✓'); el('b-rounds',`All ${breathing.total} rounds done`);
      el_btn('b-start-btn','Practice Again');
      document.getElementById('b-done-msg')?.classList.remove('hidden');
      const dot=document.getElementById('b-dot'); if(dot) dot.style.opacity='0';
      return;
    }
  }

  const t = breathing.elapsed/breathing.cycleTime;
  const phaseIdx = Math.floor(t*4);
  const phaseFrac = (t*4)%1;
  const pd = breathing.phaseDuration||4;
  const count = Math.ceil(phaseFrac*pd)||pd;
  const colors=['#ffb800','#52c050','#ffb800','#52c050'];

  const [cx,cy] = bDotPos(t);
  const dot=document.getElementById('b-dot'); if(dot){dot.setAttribute('cx',cx);dot.setAttribute('cy',cy);}
  const box=document.getElementById('b-box'); if(box) box.setAttribute('stroke',colors[phaseIdx]);
  el('b-phase',breathing.phases[phaseIdx]);
  el('b-count',String(count));
  el('b-rounds',`Round ${breathing.round} of ${breathing.total}`);

  breathing.animFrame = requestAnimationFrame(breathingTick);
}

function bDotPos(t){
  const m=48,s=104;
  const pos=(t*4)%4;
  const phase=Math.floor(pos), frac=pos%1;
  switch(phase){
    case 0: return [m+frac*s, m];
    case 1: return [m+s, m+frac*s];
    case 2: return [m+s-frac*s, m+s];
    case 3: return [m, m+s-frac*s];
    default: return [m,m];
  }
}

function stanceStart(){
  if(stance.running){ stanceStop(true); return; }
  stance.running=true; stance.elapsed=0; stance.lastTs=null;
  el('s-status','HOLD!'); document.getElementById('s-status').className='stance-status-txt holding';
  el_btn('s-start-btn','Stop');
  stance.animFrame = requestAnimationFrame(stanceTick);
}

function stanceTick(ts){
  if(!stance.running) return;
  if(!stance.lastTs) stance.lastTs=ts;
  stance.elapsed+=(ts-stance.lastTs)/1000;
  stance.lastTs=ts;
  const target=stance.effectiveTarget||state.ironHorseTarget||30;
  const pct=Math.min(1,stance.elapsed/target);
  const circ=477.5;
  const ring=document.getElementById('s-ring');
  if(ring) ring.setAttribute('stroke-dashoffset', circ-(circ*pct));
  el('s-countdown', Math.floor(stance.elapsed)+'s');
  if(stance.elapsed>=target){ stanceStop(false); return; }
  stance.animFrame=requestAnimationFrame(stanceTick);
}

function stanceStop(manual){
  stance.running=false;
  cancelAnimationFrame(stance.animFrame);
  const secs=Math.floor(stance.elapsed);
  const target=stance.effectiveTarget||state.ironHorseTarget||30;
  const achieved=secs>=target;

  if(secs>state.ironHorseBest){ state.ironHorseBest=secs; }
  if(achieved){
    state.ironHorseTarget=target+10;
    el('s-status','TARGET REACHED!');
    document.getElementById('s-status').className='stance-status-txt done';
    playComplete();
  } else {
    el('s-status',manual?'Stopped at '+secs+'s':'Complete!');
    document.getElementById('s-status').className='stance-status-txt '+(manual?'idle':'done');
    if(achieved||!manual) playBell(440,1);
  }
  el('s-best','Personal best: '+state.ironHorseBest+'s');
  el_btn('s-start-btn','Try Again');
  saveState();
}

function stanceReset(){
  stance.running=false; cancelAnimationFrame(stance.animFrame);
  stance.elapsed=0; stance.lastTs=null;
  const ring=document.getElementById('s-ring'); if(ring) ring.setAttribute('stroke-dashoffset','477.5');
  el('s-status','Ready — take your stance');
  document.getElementById('s-status').className='stance-status-txt idle';

  const t=stance.effectiveTarget||state.ironHorseTarget||30;
  const txtEl=document.getElementById('s-target-txt'); if(txtEl) txtEl.textContent=t+'s';
  el('s-target-info','Target: '+t+' seconds');
}

/* ═══════════════════════════════════════════════════════
   FORM STEPPER
═══════════════════════════════════════════════════════ */
const formTimed = {running:false,elapsed:0,interval:null};

function renderForm(wrap, lvl){
  formStep=0;
  if(lvl>=2){ renderFormTimed(wrap); return; }
  if(lvl>=1){ renderFormMemory(wrap); return; }
  wrap.innerHTML=`<div class="form-stepper"><div class="form-prog-bar"><div class="form-prog-fill" id="fp-fill" style="width:0%"></div></div><div id="fp-body"></div></div>`;
  updateFormStep();
}

function renderFormMemory(wrap){
  wrap.innerHTML=`<div class="form-stepper"><div class="form-prog-bar"><div class="form-prog-fill" id="fp-fill" style="width:0%"></div></div><div id="fp-body"></div></div>`;
  updateFormMemoryStep();
}

function updateFormMemoryStep(){
  const total=FORM_STEPS.length;
  const fill=document.getElementById('fp-fill');
  if(fill) fill.style.width=((formStep/total)*100)+'%';
  const body=document.getElementById('fp-body');
  if(!body) return;
  if(formStep>=total){
    body.innerHTML=`
      <div class="form-step-body">
        <span class="fs-em">🏆</span>
        <div class="fs-name">Form Complete — From Memory!</div>
        <div class="fs-desc">You performed all eight moves without being shown the instructions. That is warrior level.</div>
        <div style="margin-top:8px"><button class="btn btn-gold" onclick="formStep=0;updateFormMemoryStep()">Practice Again</button></div>
      </div>
    `;
    playComplete(); return;
  }
  const step=FORM_STEPS[formStep];
  const dots=FORM_STEPS.map((_,i)=>`<span class="fsdot ${i<formStep?'done':i===formStep?'active':''}"></span>`).join('');
  body.innerHTML=`
    <div class="form-step-body">
      <div class="fs-num">Move ${formStep+1} of ${total} — Memory Mode</div>
      <span class="fs-em">${step.emoji}</span>
      <div class="fs-name">${step.name}</div>
      <details class="form-reveal"><summary class="btn btn-outline btn-sm" style="margin-top:8px">Show Instructions</summary><div class="fs-desc" style="margin-top:8px">${step.desc}</div></details>
      ${step.video?`<button class="video-toggle" onclick="toggleFormVideo(this,'${step.video}')">▶ Watch how</button><div class="video-wrap" style="display:none"></div>`:''}
    </div>
    <div class="form-nav">
      <button class="btn btn-outline btn-sm" onclick="formStep--;updateFormMemoryStep()" ${formStep===0?'disabled':''}>← Back</button>
      <div class="form-step-dots">${dots}</div>
      <button class="btn btn-primary btn-sm" onclick="formStep++;updateFormMemoryStep()">${formStep===total-1?'Complete ✓':'Next Move →'}</button>
    </div>
  `;
  if(formStep>0) playBell(550,0.6);
}

function toggleFormVideo(btn, videoId){
  const wrap = btn.nextElementSibling;
  const open = wrap.style.display === 'none';
  if(open){
    wrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1" allowfullscreen></iframe>`;
    wrap.style.display = 'block';
    btn.textContent = '✕ Close video';
  } else {
    wrap.innerHTML = '';
    wrap.style.display = 'none';
    btn.textContent = '▶ Watch how';
  }
}

function renderFormTimed(wrap){
  const best=state.formTimedBest||0;
  wrap.innerHTML=`
    <div class="form-timed">
      <div class="ft-intro">Perform all 8 moves — opening bow to closing bow — as smoothly as you can. Press Start when ready.</div>
      <ol class="ft-steps-list">${FORM_STEPS.map(s=>`<li>${s.emoji} ${s.name}</li>`).join('')}</ol>
      <div class="ft-display" id="ft-display">0.0s</div>
      ${best>0?`<div class="ft-best" id="ft-best">⭐ Best: ${best.toFixed(1)}s</div>`:'<div class="ft-best" id="ft-best"></div>'}
      <div class="timer-ctrls">
        <button class="btn btn-primary" id="ft-btn" onclick="formTimedToggle()">Start</button>
      </div>
    </div>
  `;
}

function formTimedToggle(){
  if(formTimed.running){
    formTimed.running=false; clearInterval(formTimed.interval);
    const secs=formTimed.elapsed;
    if(!state.formTimedBest||secs<state.formTimedBest){ state.formTimedBest=secs; saveState(); }
    el('ft-display',secs.toFixed(1)+'s — Done! 🏆');
    const bestEl=document.getElementById('ft-best');
    if(bestEl) bestEl.textContent='⭐ Best: '+state.formTimedBest.toFixed(1)+'s';
    el_btn('ft-btn','Try Again');
    playComplete();
  } else {
    formTimed.running=true; formTimed.elapsed=0;
    el_btn('ft-btn','Stop — Done!');
    clearInterval(formTimed.interval);
    formTimed.interval=setInterval(()=>{ formTimed.elapsed+=0.1; el('ft-display',formTimed.elapsed.toFixed(1)+'s'); },100);
  }
}

function updateFormStep(){
  const total=FORM_STEPS.length;
  const fill=document.getElementById('fp-fill');
  if(fill) fill.style.width=((formStep/total)*100)+'%';
  const body=document.getElementById('fp-body');
  if(!body) return;

  if(formStep>=total){
    body.innerHTML=`
      <div class="form-step-body">
        <span class="fs-em">🏆</span>
        <div class="fs-name">Form Complete</div>
        <div class="fs-desc">You have performed all eight moves. Practice it again until it flows without thought — that is when it becomes yours.</div>
        <div style="margin-top:8px"><button class="btn btn-gold" onclick="formStep=0;updateFormStep()">Practice Again</button></div>
      </div>
    `;
    playComplete();
    return;
  }

  const step=FORM_STEPS[formStep];
  const dots=FORM_STEPS.map((_,i)=>`<span class="fsdot ${i<formStep?'done':i===formStep?'active':''}"></span>`).join('');

  body.innerHTML=`
    <div class="form-step-body">
      <div class="fs-num">Move ${formStep+1} of ${total}</div>
      <span class="fs-em">${step.emoji}</span>
      <div class="fs-name">${step.name}</div>
      <div class="fs-desc">${step.desc}</div>
      ${step.video?`<button class="video-toggle" onclick="toggleFormVideo(this,'${step.video}')">▶ Watch how</button><div class="video-wrap" style="display:none"></div>`:''}
    </div>
    <div class="form-nav">
      <button class="btn btn-outline btn-sm" onclick="formStep--;updateFormStep()" ${formStep===0?'disabled':''}>← Back</button>
      <div class="form-step-dots">${dots}</div>
      <button class="btn btn-primary btn-sm" onclick="formStep++;updateFormStep()">${formStep===total-1?'Complete ✓':'Next Move →'}</button>
    </div>
  `;
  if(formStep>0) playBell(550,0.6);
}

/* ═══════════════════════════════════════════════════════
   MARK COMPLETE + CEREMONY
═══════════════════════════════════════════════════════ */
function handleAwardBelt(){
  const wb = getWorkingBelt();
  const bm = BELT_META[wb];
  if(!allReadyForBelt()){ alert(`Complete all 8 scrolls with ${BELT_SESSIONS} practice sessions each before awarding the ${bm.label}.`); return; }
  if(!confirm(`Award the ${bm.emoji} ${bm.label} to ${state.monkName||'the monk'}?\n\nThe Abbot has witnessed the training across all eight scrolls.`)) return;

  state.belt = wb;
  saveState();
  logSession(0, 'belt-'+wb);
  showCeremony(wb);
}

function showCeremony(beltAwarded){
  const bm = BELT_META[beltAwarded]||BELT_META['yellow'];
  const overlay = document.getElementById('ceremony-overlay');
  overlay.classList.remove('hidden');

  const canvas = document.getElementById('particles-canvas');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  if(stopParticles) stopParticles();
  stopParticles = startParticles(canvas);
  playCeremony();

  const prize = BELT_PRIZES[beltAwarded];
  const prizeHtml = prize ? `<div class="cer-prize">
    <div class="cer-prize-header">🎁 Your Prize — claim it with a Parent!</div>
    ${prize.rewards.map(r=>`<div class="cer-prize-row"><span style="font-size:1.3rem">${r.icon}</span><span>${r.text}</span></div>`).join('')}
  </div>` : '';

  const nextBelt = beltAwarded==='yellow'?'🟠 Orange Belt':beltAwarded==='orange'?'⚫ Black Belt':null;
  const nextHtml = nextBelt ? `<div class="cer-promo-desc" style="margin-top:8px">${nextBelt} training is now unlocked across all scrolls.</div>` : '';

  const vowHtml = beltAwarded==='black' ? [1,2,3].filter(i=>state.vows[i]).map(i=>`<div class="cer-vow-line">"${esc(state.vows[i])}"</div>`).join('') : '';

  document.getElementById('ceremony-inner').innerHTML=`
    <span class="cer-em">${bm.emoji}</span>
    <div class="cer-label">${bm.label} Earned!</div>
    <div class="cer-subtitle" style="color:var(--text-muted);font-size:.95rem;margin-bottom:4px">All eight scrolls mastered at ${bm.title} level</div>
    ${nextHtml}
    ${prizeHtml}
    ${vowHtml ? `<div class="cer-vows">${vowHtml}</div>` : ''}
    <button class="btn btn-gold btn-lg" onclick="hideCeremony()">Continue the Path →</button>
  `;

  updateNavSash();
}

function hideCeremony(){
  if(stopParticles){stopParticles();stopParticles=null;}
  document.getElementById('ceremony-overlay').classList.add('hidden');
  goHome();
}

function startParticles(canvas){
  const ctx=canvas.getContext('2d');
  let active=true;
  const particles=Array.from({length:70},()=>({
    x:Math.random()*canvas.width,
    y:canvas.height+Math.random()*80,
    r:Math.random()*4+1.5,
    speed:Math.random()*1.2+0.4,
    opacity:Math.random()*0.7+0.2,
    wobble:Math.random()*Math.PI*2,
    ws:Math.random()*0.04+0.015
  }));
  function tick(){
    if(!active) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.y-=p.speed; p.wobble+=p.ws; p.opacity-=0.002;
      if(p.y<-20||p.opacity<=0){p.y=canvas.height+20;p.x=Math.random()*canvas.width;p.opacity=Math.random()*0.7+0.2;}
      ctx.save();ctx.globalAlpha=Math.max(0,p.opacity);
      ctx.fillStyle='#ffb800';ctx.beginPath();
      ctx.arc(p.x+Math.sin(p.wobble)*18,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();
    });
    requestAnimationFrame(tick);
  }
  tick();
  return ()=>{active=false;};
}

function toggleSessionLog(){
  const drawer=document.getElementById('session-log-drawer');
  drawer.classList.toggle('open');
  if(drawer.classList.contains('open')) renderSessionLog();
}

function renderSessionLog(){
  document.getElementById('streak-num').textContent=getStreak();
  const container=document.getElementById('log-entries');
  if(!state.sessions.length){
    container.innerHTML='<div class="log-empty">No sessions yet.<br>Enter a scroll to begin your training.</div>';
    return;
  }
  container.innerHTML=state.sessions.slice(0,40).map(s=>{
    const scroll=SCROLLS.find(sc=>sc.id===s.scrollId);
    return `
      <div class="log-entry">
        <div class="log-entry-top">
          <span class="log-sname">${scroll?scroll.emoji+' '+scroll.name:('Scroll '+s.scrollId)}</span>
          <span class="log-date">${formatDate(s.date)}</span>
        </div>
        <div class="log-type ${s.type}">${s.type==='belt-yellow'?'🟡 Yellow Belt Awarded':s.type==='belt-orange'?'🟠 Orange Belt Awarded':s.type==='belt-black'?'⚫ Black Belt Awarded':s.type==='practiced'?'✓ Practised':s.type==='completed'?'✓ Completed':'Started session'}</div>
      </div>
    `;
  }).join('');
}

/* ═══════════════════════════════════════════════════════
   STOP ALL TIMERS
═══════════════════════════════════════════════════════ */
function stopAllTimers(){
  if(breathing.running||breathing.paused){
    breathing.running=false; breathing.paused=false;
    cancelAnimationFrame(breathing.animFrame);
  }
  if(breathing478.running) breathing478Clear();
  if(stance.running){
    stance.running=false;
    cancelAnimationFrame(stance.animFrame);
  }
  if(formTimed.running){
    formTimed.running=false; clearInterval(formTimed.interval);
  }
  if(scrollTimer.interval){ clearInterval(scrollTimer.interval); scrollTimer.interval=null; }
  document.getElementById('complete-bar')?.classList.add('hidden');
}
